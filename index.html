function LoginView({ onDismiss }) {
  const [email, setEmail] = useState('justinmrck@gmail.com');
  const [sent, setSent] = useState(false);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  const send = async () => {
    const e = email.trim();
    if (!e) return;
    setBusy(true); setErr('');
    const { error } = await sb.auth.signInWithOtp({
      email: e,
      options: { emailRedirectTo: window.location.origin + window.location.pathname },
    });
    setBusy(false);
    if (error) setErr(error.message);
    else setSent(true);
  };

  return (
    <div className="login-box" style={{position:'relative'}}>
      {onDismiss && <button onClick={onDismiss} style={{position:'absolute',top:12,right:12,background:'none',border:'none',color:'var(--muted)',fontSize:18,cursor:'pointer',lineHeight:1}}>✕</button>}
      <div className="login-brand">DENSITY</div>
      <div className="login-tag">SIGN IN TO RESTORE DATA</div>
      {!sent ? (
        <>
          <div className="login-blurb">Send a magic link to sync your cloud data to this device.</div>
          <input
            type="email"
            inputMode="email"
            autoCapitalize="off"
            autoCorrect="off"
            placeholder="your@email.com"
            value={email}
            onChange={e => setEmail(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') send(); }}
            className="login-input"
          />
          <button className="login-btn" onClick={send} disabled={busy || !email.trim()}>
            {busy ? 'SENDING...' : 'SEND MAGIC LINK'}
          </button>
          {err && <div className="login-err">{err}</div>}
        </>
      ) : (
        <div className="login-sent">
          <div className="login-sent-title">CHECK YOUR EMAIL</div>
          <div className="login-sent-sub">Magic link sent to<br/>{email}<br/><br/>Tap the link — your data will restore automatically.</div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [session, setSession] = useState(null);
  const [authReady, setAuthReady] = useState(false);
  const [hydrated, setHydrated] = useState(false);
  const [syncState, setSyncState] = useState('idle');
  const [data, setData] = useState(loadData);
  const [tab, setTab] = useState('train');
  const [activeSession, setActiveSession] = useState(null); // { week, dayId } | null
  const [showLogin, setShowLogin] = useState(false);
  const debounceRef = useRef(null);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => {
      setSession(data.session || null);
      setAuthReady(true);
    });
    const { data: sub } = sb.auth.onAuthStateChange((_evt, s) => {
      setSession(s || null);
      if (s) setShowLogin(false);
      if (!s) setHydrated(false);
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (!session) return;
    let cancelled = false;
    setSyncState('syncing');
    pullCloud(session.user.id).then(async row => {
      if (cancelled) return;
      if (row && row.data) {
        setData(mergeCloudData(row.data));
      } else {
        await pushCloud(session.user.id, data);
      }
      setHydrated(true);
      setSyncState('idle');
    });
    return () => { cancelled = true; };
  }, [session]);

  useEffect(() => {
    saveData(data); // always persist locally
    if (!session || !hydrated) return;
    if (debounceRef.current) clearTimeout(debounceRef.current);
    setSyncState('syncing');
    debounceRef.current = setTimeout(async () => {
      const ok = await pushCloud(session.user.id, data);
      setSyncState(ok ? 'idle' : 'offline');
    }, 1500);
    return () => { if (debounceRef.current) clearTimeout(debounceRef.current); };
  }, [data, session, hydrated]);


  const update = (patch, silent) => {
    setData(prev => ({ ...prev, ...patch }));
  };

  const signOut = async () => {
    if (!confirm('Sign out? Your data is safely synced.')) return;
    if (debounceRef.current) {
      clearTimeout(debounceRef.current);
      await pushCloud(session.user.id, data);
    }
    await sb.auth.signOut();
  };


  const advanceWeek = () => {
    if (confirm('Advance to next week? Current sessions will remain in history.')) {
      update({ currentWeek: data.currentWeek + 1 });
    }
  };
  const resetWeek = () => {
    if (confirm('Reset this week? In-progress (unsaved) data will be cleared, history is kept.')) {
      const ns = { ...data.sessions };
      ['d1','d2','d3','d4','d5'].forEach(d => delete ns[sessionKey(data.currentWeek, d)]);
      update({ sessions: ns });
    }
  };
  const resetProgram = () => {
    if (confirm('Start program from Week 1? All session completion markers will be cleared. Your exercise history (weights/reps) is kept.')) {
      update({ currentWeek: 0, sessions: {} });
    }
  };

  const logBodyweight = (date, val) => {
    const next = { ...data.bodyweight };
    if (val === null) delete next[date];
    else next[date] = val;
    update({ bodyweight: next });
  };

  const logSteps = (date, val) => {
    const next = { ...(data.steps || {}) };
    if (val === null) delete next[date];
    else next[date] = val;
    update({ steps: next });
  };

  const saveRunLog = (runId, log) => {
    const next = { ...(data.runHistory || {}) };
    if (log === null) delete next[runId];
    else next[runId] = log;
    update({ runHistory: next });
  };

  let view;
  if (tab === 'train') {
    if (activeSession) {
      view = (
        <SessionView
          data={data}
          week={activeSession.week}
          dayId={activeSession.dayId}
          onBack={() => setActiveSession(null)}
          onSave={(patch, silent) => update(patch, silent)}
        />
      );
    } else {
      view = (
        <DashboardView
          data={data}
          onSelectDay={(week, dayId) => setActiveSession({ week, dayId })}
          onAdvanceWeek={advanceWeek}
          onResetWeek={resetWeek}
          onResetProgram={resetProgram}
        />
      );
    }
  } else if (tab === 'run') {
    view = <RunPlanView data={data} onSaveLog={saveRunLog} />;
  } else if (tab === 'body') {
    view = <BodyweightView data={data} onLog={logBodyweight} onLogSteps={logSteps} />;
  } else {
    view = <ProgressView data={data} />;
  }

  const week = data.currentWeek;

  return (
    <div className="app">
      <header className="app-header">
        <div className="brand">
          <div className="brand-logo">DENSITY</div>
          <div className="brand-tag">TRAINING TRACKER</div>
        </div>
        <div style={{display:'flex', alignItems:'center'}}>
          <div className={`week-pill ${isDeloadWeek(week) ? 'deload' : ''}`}>
            {getWeekLabel(week)} · CYC {String(getCycleNum(week)).padStart(2,'0')}
          </div>
          {session && <span className={`sync-dot ${syncState}`} title={syncState === 'syncing' ? 'Syncing' : syncState === 'offline' ? 'Offline' : 'Synced'}></span>}
          {session && <button className="signout-btn" onClick={signOut}>OUT</button>}
          {!session && <button className="signout-btn" onClick={() => setShowLogin(true)}>SYNC</button>}
        </div>
      </header>
      <main>{view}</main>
      {!activeSession && <TabBar tab={tab} onPick={setTab} />}
      {showLogin && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:999,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={() => setShowLogin(false)}>
          <div onClick={e => e.stopPropagation()}>
            <LoginView onDismiss={() => setShowLogin(false)} />
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
